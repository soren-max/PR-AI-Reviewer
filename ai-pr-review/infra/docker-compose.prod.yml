# =============================================================================
# AI PR Review — Production Docker Compose
# =============================================================================
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
# =============================================================================
version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-pr-review-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - DEBUG=false
    volumes:
      - review_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: runner
    container_name: ai-pr-review-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://backend:8000/api/v1
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  review_data:
