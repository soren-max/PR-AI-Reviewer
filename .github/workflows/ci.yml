# =============================================================================
# CI Pipeline — Push → Lint → Test → Coverage → Block on Failure
# =============================================================================
name: CI

"on":
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"

jobs:
  # ===========================================================================
  # Lint — ruff + flake8 + mypy
  # ===========================================================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8 mypy

      - name: ruff check
        run: ruff check . --output-format=github
        # 失败时自动阻断

      - name: ruff format
        run: ruff format . --check --diff

      - name: flake8
        run: flake8 . --count --statistics

      - name: mypy
        run: |
          mypy github_url.py github_client.py diff_analyzer.py risk_engine.py \
            --strict --ignore-missing-imports --no-incremental

  # ===========================================================================
  # Test — pytest + Coverage
  # ===========================================================================
  test:
    name: 🧪 Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: true  # 一个版本失败即阻断

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov httpx requests

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --no-header \
            -p no:cacheprovider \
            --cov=github_url \
            --cov=github_client \
            --cov=diff_analyzer \
            --cov=risk_engine \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == env.PYTHON_VERSION
        with:
          file: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # Summary — 最终状态汇总
  # ===========================================================================
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.lint.result }}" == "success" && "${{ needs.test.result }}" == "success" ]]; then
            echo "✅ ─────────────────────────────────────"
            echo "✅  CI PASSED — All checks green"
            echo "✅ ─────────────────────────────────────"
            echo ""
            echo "   🔍 Lint:   ${{ needs.lint.result }}"
            echo "   🧪 Test:   ${{ needs.test.result }}"
            echo ""
            echo "   Coverage threshold: ≥80%"
            echo "   Fail-fast:          enabled"
          else
            echo "❌ ─────────────────────────────────────"
            echo "❌  CI FAILED — Pipeline blocked"
            echo "❌ ─────────────────────────────────────"
            echo ""
            echo "   🔍 Lint:   ${{ needs.lint.result }}"
            echo "   🧪 Test:   ${{ needs.test.result }}"
            echo ""
            echo "   Fix the failures above before merging."
            exit 1
          fi
