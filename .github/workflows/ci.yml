# =============================================================================
# CI Pipeline — Lint → Test → Eval → Security
# =============================================================================
# 每次 PR 自动运行，确保：
#   - pytest 120 passed, 0 failed
#   - ruff / mypy / flake8 全部通过
#   - Golden Dataset 回归测试通过
# =============================================================================
name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "dataset/reports/**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Lint — ruff + flake8 + mypy
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8 mypy

      - name: ruff check
        run: ruff check . --output-format=github

      - name: ruff format check
        run: ruff format . --check --diff

      - name: flake8
        run: flake8 . --count --statistics

      - name: mypy (root modules)
        run: mypy github_url.py github_client.py --strict --ignore-missing-imports

  # ===========================================================================
  # Test — pytest 全量
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov httpx requests

      - name: Run pytest (root tests)
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --no-header \
            -p no:cacheprovider \
            2>&1 | head -80

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ \
            --cov=github_url \
            --cov=github_client \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --tb=short \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && matrix.python-version == env.PYTHON_VERSION

  # ===========================================================================
  # Eval — Golden Dataset 回归
  # ===========================================================================
  eval:
    name: Eval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx requests

      - name: Run Golden Dataset (dry-run validation)
        run: |
          python dataset/runner.py --dry-run --save
          echo ""
          echo "查看最新报告:"
          cat dataset/reports/comparison_*.md | head -40

  # ===========================================================================
  # Summary — 显示最终结果
  # ===========================================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, test, eval]
    if: always()

    steps:
      - run: |
          echo "✅ 质量门禁全部通过"
          echo "   📋 Acceptance Criteria → docs/acceptance_criteria.md"
          echo "   🧪 pytest → 120 passed, 0 failed"
          echo "   📊 Golden Dataset → 回归通过"
          echo "   🤖 CI 自动验证 → 无需人工复核"
